<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Social — Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="profile-page" class="app-shell">

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-placeholder">NEXUS</div>
      </div>
      <ul class="nav-list" id="sidebar-nav">
        <!-- rendered by JS -->
      </ul>
      <div class="sidebar-user" id="sidebar-user">
        <!-- rendered by JS -->
      </div>
    </aside>

    <!-- Profile Main -->
    <main class="main-feed" id="profile-main">
      <!-- rendered by JS -->
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search people">
        <div class="search-results" id="search-results"></div>
      </div>

      <!-- Campus News Widget -->
      <div class="widget-card">
        <div class="widget-title">Campus News</div>
        <div id="campus-news"></div>
        <div class="widget-show-more">Show more</div>
      </div>

      <!-- Suggested Users Widget -->
      <div class="widget-card">
        <div class="widget-title">Who to follow</div>
        <div id="suggest-users"></div>
        <div class="widget-show-more">Show more</div>
      </div>
    </aside>

  </div>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <span>Messages</span>
      <div class="chat-header-right">
        <button class="chat-icon-btn" id="chat-close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-conversations" id="chat-list"></div>
    <div class="chat-thread" id="chat-thread"></div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="edit-profile-modal">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-close" id="ep-close">✕</button>
        <span class="modal-title">Edit profile</span>
        <button class="btn-save" id="ep-save">Save</button>
      </div>

      <!-- Banner -->
      <div class="modal-banner" id="ep-banner-click">
        <img id="ep-banner-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover">
        <div class="modal-banner-overlay">
          <span class="modal-banner-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px"><path d="M12 15.2c-1.99 0-3.6-1.61-3.6-3.6s1.61-3.6 3.6-3.6 3.6 1.61 3.6 3.6-1.61 3.6-3.6 3.6zm7.8-10H4.2C3.54 5.2 3 5.74 3 6.4v13.2c0 .66.54 1.2 1.2 1.2h15.6c.66 0 1.2-.54 1.2-1.2V6.4c0-.66-.54-1.2-1.2-1.2zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
            Add banner
          </span>
        </div>
        <input type="file" id="ep-banner-input" accept="image/*" style="display:none">
      </div>

      <!-- Avatar -->
      <div class="modal-avatar-wrap" id="ep-avatar-click">
        <img id="ep-avatar-img" class="modal-avatar" src="" alt="">
        <div class="modal-avatar-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2c-1.99 0-3.6-1.61-3.6-3.6s1.61-3.6 3.6-3.6 3.6 1.61 3.6 3.6-1.61 3.6-3.6 3.6zm7.8-10H4.2C3.54 5.2 3 5.74 3 6.4v13.2c0 .66.54 1.2 1.2 1.2h15.6c.66 0 1.2-.54 1.2-1.2V6.4c0-.66-.54-1.2-1.2-1.2z"/></svg>
        </div>
        <input type="file" id="ep-avatar-input" accept="image/*" style="display:none">
      </div>

      <!-- Form Fields -->
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" type="text" id="ep-displayname" placeholder="Your display name" maxlength="50">
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" id="ep-username" placeholder="username" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea class="form-input" id="ep-bio" placeholder="Tell people about yourself" rows="3" maxlength="160" style="resize:vertical"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" type="text" id="ep-location" placeholder="Where are you based?" maxlength="30">
        </div>
      </div>
    </div>
  </div>

  <div class="notif-modal-overlay" id="notif-modal">
    <div class="notif-modal">
      <div class="notif-modal-header">
        <button class="notif-modal-back" id="notif-modal-back">←</button>
        <span>Notifications</span>
        <button class="notif-modal-close" id="notif-modal-close">✕</button>
      </div>
      <div class="notif-panel" id="notif-panel"></div>
    </div>
  </div>

  <!-- Followers/Following Modal -->
  <div class="follow-modal-overlay" id="follow-modal">
    <div class="follow-modal">
      <div class="follow-modal-header">
        <button class="follow-modal-back" id="follow-modal-back">←</button>
        <span class="follow-modal-title" id="follow-modal-title">Follow</span>
        <button class="follow-modal-settings" id="follow-modal-settings">⚙️</button>
      </div>
      <div class="follow-modal-tabs">
        <div class="follow-modal-tab active" data-tab="suggested">Who to follow</div>
        <div class="follow-modal-tab" data-tab="creators">Creators for you</div>
      </div>
      <div class="follow-modal-subtitle" id="follow-modal-subtitle">Suggested for you</div>
      <div class="follow-modal-list" id="follow-modal-list"></div>
    </div>
  </div>

  <div class="reply-modal-overlay" id="reply-modal">
    <div class="reply-modal">
      <div class="reply-modal-header">
        <span class="reply-modal-title">Reply</span>
        <button class="reply-modal-close" id="reply-modal-close">✕</button>
      </div>
      <div class="reply-modal-body">
        <div class="reply-summary" id="reply-summary"></div>
        <div class="reply-list" id="reply-list"></div>
        <textarea class="reply-input" id="reply-input" placeholder="Write your reply..." rows="3"></textarea>
        <button class="btn-submit reply-send-btn" id="reply-send-btn" disabled>Send reply</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="app.js"></script>
  <script type="module">
    // Wire up right sidebar search on profile page
    document.addEventListener('DOMContentLoaded', () => {
      const cu = window.getCurrentUser ? window.getCurrentUser() : null;
      if (cu) {
        // Render campus news & suggested users in right sidebar
        setTimeout(() => {
          if (typeof renderCampusNews === 'function') renderCampusNews();
          if (typeof renderSuggestedUsers === 'function') renderSuggestedUsers(cu);
          if (typeof initSearch === 'function') initSearch(cu);
        }, 50);
      }
    });
  </script>
</body>
</html>
